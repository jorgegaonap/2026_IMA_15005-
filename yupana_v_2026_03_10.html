<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YupanaInka</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap');
:root {
  --wood-light: #D4975A; --wood-mid: #C07E3E; --wood-dark: #8B5020;
  --line-color: #4A2C0A; --cream: #F5E6C8; --bg: #1C0F05;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 20%, rgba(180,100,40,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, rgba(100,50,10,0.15) 0%, transparent 55%);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 32px 16px 48px;
  font-family: 'IM Fell English', Georgia, serif;
}
.title-block { text-align:center; margin-bottom: 14px; }
.title-block h1 {
  font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,5vw,2.8rem);
  color: var(--wood-light); letter-spacing: 0.18em; text-shadow: 0 2px 12px rgba(180,100,40,0.4);
}
.title-block .reg { font-size:0.5em; vertical-align:super; opacity:0.6; }
.title-block p { font-size:0.82rem; color:#9A7050; font-style:italic; letter-spacing:0.08em; margin-top:4px; }

/* ── TOGGLE ── */
.toggle-bar { display:flex; justify-content:center; margin-bottom:16px; }
.toggle-btn {
  background:rgba(74,44,10,0.35); border:1.5px solid #6B3C10; border-radius:20px;
  padding:6px 18px; cursor:pointer; color:var(--wood-light);
  font-family:'Playfair Display',serif; font-size:0.72rem; letter-spacing:0.12em;
  transition:all 0.2s; display:flex; align-items:center; gap:8px;
}
.toggle-btn:hover { background:rgba(107,60,16,0.5); }
.toggle-btn .icon { transition:opacity 0.25s; }

.layout {
  display:flex; gap:28px; align-items:flex-start;
  flex-wrap:wrap; justify-content:center; width:100%; max-width:960px;
}

/* ══ TABLERO ══ */
.board-outer {
  border-radius:14px; padding:4px;
  background:linear-gradient(135deg,#8B5020 0%,#C07E3E 40%,#A0621C 60%,#7A4010 100%);
  box-shadow:0 12px 40px rgba(0,0,0,0.7),0 2px 0 rgba(200,140,60,0.3) inset,0 -2px 0 rgba(0,0,0,0.4) inset;
}
.board-inner { border-radius:11px; overflow:hidden; position:relative; }
.board-inner::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background:
    repeating-linear-gradient(92deg,transparent 0px,rgba(180,100,30,0.06) 1px,transparent 2px,transparent 18px),
    repeating-linear-gradient(88deg,transparent 0px,rgba(100,50,10,0.04) 1px,transparent 3px,transparent 34px),
    linear-gradient(170deg,#D8975C 0%,#C07E3E 18%,#D4925A 35%,#BA742C 52%,#CF8E50 68%,#B86E28 85%,#C8864A 100%);
}
.board-grid { position:relative; z-index:1; }

/* ── ENCABEZADO COLUMNAS ── */
.col-header {
  display:grid; grid-template-columns:86px repeat(4,1fr);
  border-bottom:3px solid var(--line-color);
  background:rgba(0,0,0,0.15); position:relative; z-index:1;
}
.col-header-label {
  border-right:2.5px solid var(--line-color);
  display:flex; align-items:center; justify-content:flex-end; padding:4px 10px;
}
.col-header-label span {
  font-family:'Playfair Display',serif; font-size:0.52rem;
  letter-spacing:0.08em; color:rgba(74,44,10,0.5); text-transform:uppercase;
}
.col-icon-cell {
  border-right:2.5px solid var(--line-color);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:5px 4px; gap:2px;
}
.col-icon-cell:last-child { border-right:none; }
.col-icon-dots {
  display:flex; flex-wrap:wrap; gap:3px; justify-content:center; align-items:center;
  width:36px; min-height:24px;
}
.col-icon-dot {
  width:7px; height:8px; border-radius:50% 50% 45% 45%;
  background:radial-gradient(circle at 38% 30%,#6A3418,#1A0804);
  box-shadow:0 1px 2px rgba(0,0,0,0.4); flex-shrink:0;
}
.col-icon-val {
  font-family:'Playfair Display',serif; font-size:0.6rem;
  color:rgba(74,44,10,0.6); font-style:italic; margin-top:1px;
}

/* ── FILA ── */
.board-row {
  display:grid; grid-template-columns:86px repeat(4,1fr);
  border-bottom:2.5px solid var(--line-color);
}
.board-row:last-child { border-bottom:none; }

/* ── ETIQUETA FILA ── */
.row-label {
  border-right:2.5px solid var(--line-color);
  display:flex; flex-direction:column; align-items:flex-end; justify-content:center;
  padding:8px 10px 8px 6px; background:rgba(0,0,0,0.08);
}
.row-label .lname {
  font-family:'Playfair Display',serif; font-size:0.58rem; letter-spacing:0.1em;
  color:var(--line-color); text-transform:uppercase; font-weight:700;
}
.row-label .lmult { font-size:0.7rem; color:var(--wood-dark); font-style:italic; margin-top:2px; }
.row-label .lpartial { font-size:0.63rem; color:var(--line-color); opacity:0.65; margin-top:3px; min-height:13px; font-style:italic; }

/* ── CELDA: layout horizontal [−] [zona central] [+] ── */
.cell {
  border-right:2.5px solid var(--line-color);
  display:flex; flex-direction:row; align-items:stretch;
  min-height:100px; position:relative; user-select:none;
}
.cell:last-child { border-right:none; }

/* Botones laterales */
.cell-btn {
  width:18px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; line-height:1; color:rgba(74,44,10,0.55);
  background:rgba(0,0,0,0.08); border:none; cursor:pointer;
  transition:background 0.12s, color 0.12s, transform 0.08s, opacity 0.3s, width 0.3s;
  padding:0;
}
.cell-btn.btn-minus { border-right:1px solid rgba(74,44,10,0.2); }
.cell-btn.btn-plus  { border-left:1px solid rgba(74,44,10,0.2); }
.cell-btn:hover:not(:disabled) { background:rgba(0,0,0,0.2); color:var(--line-color); }
.cell-btn:active:not(:disabled) { transform:scale(0.9); }
.cell-btn:disabled { opacity:0.12; cursor:default; }

/* Estado oculto */
.buttons-hidden .cell-btn {
  opacity:0 !important; pointer-events:none; width:0 !important; overflow:hidden;
}

/* ── ZONA CENTRAL ── */
.cell-center {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative; padding:6px 3px;
  min-width:0;
}

/* MARCA DE FONDO — puntos grabados en madera, color claro */
.cell-mark {
  position:absolute; inset:0;
  display:flex; flex-wrap:wrap; gap:4px;
  align-items:center; justify-content:center;
  padding:6px; pointer-events:none;
  opacity:1; transition:opacity 0.3s;
}
.mark-dot {
  width:8px; height:9px; border-radius:50% 50% 45% 45%;
  background:rgba(220,175,110,0.28);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.12), 0 1px 2px rgba(0,0,0,0.15);
  flex-shrink:0;
}

/* Semillas encima de la marca */
.seeds-area {
  position:relative; z-index:2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:2px; width:100%;
}
.seed-row { display:flex; gap:2px; align-items:center; justify-content:center; }

/* contador */
.seed-count {
  position:relative; z-index:2;
  font-family:'Playfair Display',serif; font-size:0.55rem;
  color:var(--line-color); opacity:0.4; min-height:9px; line-height:1;
  transition:opacity 0.25s;
}
.buttons-hidden .seed-count { opacity:0; }

/* ── SEMILLA ── */
.seed { width:13px; height:16px; flex-shrink:0; }
.seed.pop { animation:seed-pop 0.18s ease; }
@keyframes seed-pop {
  0%   { transform:scale(0.3) rotate(-20deg); opacity:0; }
  65%  { transform:scale(1.2) rotate(4deg); }
  100% { transform:scale(1) rotate(0deg); opacity:1; }
}
.seed.remove { animation:seed-remove 0.14s ease forwards; }
@keyframes seed-remove {
  0%   { transform:scale(1); opacity:1; }
  100% { transform:scale(0.2); opacity:0; }
}
.seed svg { width:100%; height:100%; display:block; }

/* ── PANEL DERECHO ── */
.right-panel { display:flex; flex-direction:column; gap:16px; width:210px; }
.panel-card {
  background:linear-gradient(150deg,#2A1505,#1C0D02); border:1.5px solid #6B3C10;
  border-radius:10px; padding:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(200,140,60,0.1);
}
.panel-label {
  font-family:'Playfair Display',serif; font-size:0.62rem; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--wood-mid); margin-bottom:10px;
}
.num-display {
  font-family:'Playfair Display',serif; font-size:2.6rem; color:var(--wood-light);
  text-align:center; text-shadow:0 0 20px rgba(180,100,40,0.5); letter-spacing:0.04em;
  min-height:52px; display:flex; align-items:center; justify-content:center; transition:all 0.25s;
}
.breakdown { font-size:0.72rem; color:#9A7050; font-style:italic; line-height:1.7; margin-top:8px; min-height:20px; }
.wood-input {
  width:100%; background:rgba(0,0,0,0.45); border:1.5px solid #6B3C10; border-radius:5px;
  color:var(--wood-light); font-family:'Playfair Display',serif; font-size:1.4rem;
  text-align:center; padding:8px 10px; outline:none; -moz-appearance:textfield;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.wood-input::-webkit-outer-spin-button,.wood-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.wood-input:focus { border-color:var(--wood-mid); box-shadow:0 0 10px rgba(180,100,40,0.25); }
.hint { font-size:0.68rem; color:#6B4525; font-style:italic; text-align:center; margin-top:5px; }
.wood-btn {
  width:100%; margin-top:10px; padding:9px;
  background:linear-gradient(135deg,#8B5020,#6B3010); border:1px solid #C07E3E;
  border-radius:5px; color:var(--cream); font-family:'Playfair Display',serif;
  font-size:0.72rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s;
}
.wood-btn:hover { background:linear-gradient(135deg,#A0621C,#8B3C10); transform:translateY(-1px); }
.wood-btn.secondary { background:transparent; border-color:#4A2C0A; color:#9A7050; margin-top:6px; }
.wood-btn.secondary:hover { background:rgba(180,100,40,0.1); }
.col-info-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-top:4px; }
.col-badge {
  background:rgba(0,0,0,0.25); border-radius:4px; padding:5px 2px;
  text-align:center; border:1px solid rgba(74,44,10,0.4);
}
.col-badge .cv { font-family:'Playfair Display',serif; font-size:1rem; color:var(--wood-light); }
.col-badge .cl { font-size:0.58rem; color:#9A7050; font-style:italic; display:block; }
.brand {
  text-align:center; font-family:'Playfair Display',serif; font-size:0.65rem;
  letter-spacing:0.25em; color:var(--wood-dark); margin-top:12px; padding-bottom:10px; opacity:0.6;
}
@keyframes flash-wood { 0%{filter:brightness(1);}40%{filter:brightness(1.6);}100%{filter:brightness(1);} }
.flash { animation:flash-wood 0.35s ease; }
</style>
</head>
<body>
<div class="title-block">
  <h1>YUPANA<span class="reg">®</span></h1>
  <p>Calculadora del Tawantinsuyu · Imperio Inca</p>
</div>

<div class="toggle-bar">
  <button class="toggle-btn" id="toggleBtn" onclick="toggleButtons()">
    <span class="icon">👁</span>
    <span id="toggleLabel">Ocultar controles</span>
  </button>
</div>

<div class="layout">
  <div class="board-outer">
    <div class="board-inner">
      <div class="col-header" id="colHeader"></div>
      <div class="board-grid" id="boardGrid"></div>
      <div class="brand">YUPANAINKA · .com</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel-card">
      <div class="panel-label">Número representado</div>
      <div class="num-display" id="numDisplay">0</div>
      <div class="breakdown" id="breakdown"></div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Ingresar número</div>
      <input type="number" class="wood-input" id="numInput" placeholder="0" min="0" max="99999">
      <p class="hint">0 – 99.999</p>
      <button class="wood-btn" onclick="numberToBoard()">▶ Mostrar en Yupana</button>
      <button class="wood-btn secondary" onclick="clearAll()">✕ Limpiar todo</button>
    </div>
    <div class="panel-card">
      <div class="panel-label">Valor por columna</div>
      <div class="col-info-grid">
        <div class="col-badge"><span class="cv">1</span><span class="cl">col 1</span></div>
        <div class="col-badge"><span class="cv">2</span><span class="cl">col 2</span></div>
        <div class="col-badge"><span class="cv">3</span><span class="cl">col 3</span></div>
        <div class="col-badge"><span class="cv">5</span><span class="cl">col 4</span></div>
      </div>
      <p style="font-size:0.65rem;color:#6B4525;font-style:italic;margin-top:10px;line-height:1.65;">
        Los puntos claros de fondo indican el valor de cada casilla. Las semillas se agrupan en filas de 5.
      </p>
    </div>
  </div>
</div>

<script>
const MAX_SEEDS = 10;
const LEVELS = [
  { name:'Diezmiles', mult:10000 },
  { name:'Miles',     mult:1000  },
  { name:'Centenas',  mult:100   },
  { name:'Decenas',   mult:10    },
  { name:'Unidades',  mult:1     },
];
const COLS = [{ value:1 },{ value:2 },{ value:3 },{ value:5 }];

let state = Array.from({length:5}, () => [0,0,0,0]);
let buttonsVisible = true;
let seedUid = 0;

/* ── SVG semilla ── */
function seedSVG(uid) {
  return `<svg viewBox="0 0 13 16" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="g${uid}" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#6A3418"/>
      <stop offset="100%" stop-color="#1A0804"/>
    </radialGradient></defs>
    <ellipse cx="6.5" cy="9.5" rx="5.5" ry="6.5" fill="url(#g${uid})"/>
    <ellipse cx="5" cy="7" rx="2" ry="1.3" fill="rgba(255,255,255,0.22)" transform="rotate(-25,5,7)"/>
    <ellipse cx="6.5" cy="14.5" rx="3.2" ry="1" fill="rgba(0,0,0,0.28)"/>
  </svg>`;
}

/* ── Encabezado ── */
function buildHeader() {
  const header = document.getElementById('colHeader');
  header.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'col-header-label';
  empty.innerHTML = '<span>semillas</span>';
  header.appendChild(empty);
  COLS.forEach(col => {
    const cell = document.createElement('div');
    cell.className = 'col-icon-cell';
    const dotsDiv = document.createElement('div');
    dotsDiv.className = 'col-icon-dots';
    for (let i = 0; i < col.value; i++) {
      const d = document.createElement('div');
      d.className = 'col-icon-dot';
      dotsDiv.appendChild(d);
    }
    const valDiv = document.createElement('div');
    valDiv.className = 'col-icon-val';
    valDiv.textContent = `×${col.value}`;
    cell.appendChild(dotsDiv);
    cell.appendChild(valDiv);
    header.appendChild(cell);
  });
}

/* ── Construir tablero ── */
function buildBoard() {
  buildHeader();
  const grid = document.getElementById('boardGrid');
  grid.innerHTML = '';

  LEVELS.forEach((level, ri) => {
    const row = document.createElement('div');
    row.className = 'board-row';

    // Etiqueta fila
    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.innerHTML = `<span class="lname">${level.name}</span>
      <span class="lmult">×${level.mult.toLocaleString('es')}</span>
      <span class="lpartial" id="p${ri}"></span>`;
    row.appendChild(lbl);

    COLS.forEach((col, ci) => {
      const cell = document.createElement('div');
      cell.className = 'cell';

      // Botón −  (izquierda)
      const btnMinus = document.createElement('button');
      btnMinus.className = 'cell-btn btn-minus';
      btnMinus.id = `bm-${ri}-${ci}`;
      btnMinus.textContent = '−';
      btnMinus.addEventListener('click', () => changeSeed(ri, ci, -1));

      // Zona central
      const center = document.createElement('div');
      center.className = 'cell-center';

      // Marca de fondo: col.value puntos claros
      const mark = document.createElement('div');
      mark.className = 'cell-mark';
      for (let i = 0; i < col.value; i++) {
        const dot = document.createElement('div');
        dot.className = 'mark-dot';
        mark.appendChild(dot);
      }

      // Área semillas
      const area = document.createElement('div');
      area.className = 'seeds-area';
      area.id = `sa-${ri}-${ci}`;

      // Contador
      const cnt = document.createElement('div');
      cnt.className = 'seed-count';
      cnt.id = `sc-${ri}-${ci}`;

      center.appendChild(mark);
      center.appendChild(area);
      center.appendChild(cnt);

      // Botón + (derecha)
      const btnPlus = document.createElement('button');
      btnPlus.className = 'cell-btn btn-plus';
      btnPlus.id = `bp-${ri}-${ci}`;
      btnPlus.textContent = '+';
      btnPlus.addEventListener('click', () => changeSeed(ri, ci, +1));

      cell.appendChild(btnMinus);
      cell.appendChild(center);
      cell.appendChild(btnPlus);
      row.appendChild(cell);
    });

    grid.appendChild(row);
  });
  renderAll();
}

/* ── Cambiar semillas ── */
function changeSeed(ri, ci, delta) {
  const prev = state[ri][ci];
  state[ri][ci] = Math.max(0, Math.min(MAX_SEEDS, state[ri][ci] + delta));
  if (state[ri][ci] !== prev) renderCell(ri, ci, delta);
  updateDisplay();
}

/* ── Renderizar celda ── */
function renderCell(ri, ci, delta) {
  const n = state[ri][ci];
  const area = document.getElementById(`sa-${ri}-${ci}`);
  if (!area) return;

  const prevCount = area.querySelectorAll('.seed').length;

  if (delta !== undefined && delta > 0 && n > prevCount) {
    for (let i = prevCount; i < n; i++) {
      const rowIdx = Math.floor(i / 5);
      let seedRow = area.children[rowIdx];
      if (!seedRow) {
        seedRow = document.createElement('div');
        seedRow.className = 'seed-row';
        area.appendChild(seedRow);
      }
      const s = document.createElement('div');
      s.className = 'seed pop';
      s.innerHTML = seedSVG(seedUid++);
      seedRow.appendChild(s);
      const el = s;
      setTimeout(() => el.classList.remove('pop'), 200);
    }
  } else if (delta !== undefined && delta < 0 && n < prevCount) {
    const lastRow = area.lastChild;
    if (lastRow && lastRow.lastChild) {
      const lastSeed = lastRow.lastChild;
      lastSeed.classList.add('remove');
      setTimeout(() => {
        if (lastRow.children.length <= 1) area.removeChild(lastRow);
        else lastRow.removeChild(lastSeed);
      }, 140);
    }
  } else {
    area.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const rowIdx = Math.floor(i / 5);
      let seedRow = area.children[rowIdx];
      if (!seedRow) {
        seedRow = document.createElement('div');
        seedRow.className = 'seed-row';
        area.appendChild(seedRow);
      }
      const s = document.createElement('div');
      s.className = 'seed';
      s.innerHTML = seedSVG(seedUid++);
      seedRow.appendChild(s);
    }
  }

  const cnt = document.getElementById(`sc-${ri}-${ci}`);
  if (cnt) cnt.textContent = n > 0 ? String(n) : '';
  const bp = document.getElementById(`bp-${ri}-${ci}`);
  const bm = document.getElementById(`bm-${ri}-${ci}`);
  if (bp) bp.disabled = n >= MAX_SEEDS;
  if (bm) bm.disabled = n <= 0;
}

function renderAll(syncInput = false) {
  LEVELS.forEach((_, ri) => {
    COLS.forEach((_, ci) => { renderCell(ri, ci, undefined); });
  });
  updateDisplay(syncInput);
}

/* ── Actualizar display ── */
function updateDisplay(syncInput = true) {
  let total = 0;
  const parts = [];
  LEVELS.forEach((level, ri) => {
    let rowVal = 0;
    COLS.forEach((col, ci) => { rowVal += state[ri][ci] * col.value; });
    const contrib = rowVal * level.mult;
    total += contrib;
    const pel = document.getElementById(`p${ri}`);
    if (pel) pel.textContent = contrib > 0 ? `= ${contrib.toLocaleString('es')}` : '';
    if (rowVal > 0) parts.push(`${rowVal} × ${level.mult.toLocaleString('es')} = ${contrib.toLocaleString('es')}`);
  });
  document.getElementById('numDisplay').textContent = total.toLocaleString('es');
  document.getElementById('breakdown').innerHTML = parts.join('<br>');
  if (syncInput) document.getElementById('numInput').value = total > 0 ? total : '';
}

/* ── Número → tablero ── */
function numberToBoard() {
  const val = parseInt(document.getElementById('numInput').value);
  if (isNaN(val) || val < 0 || val > 99999) {
    const inp = document.getElementById('numInput');
    inp.style.borderColor = '#A03020';
    setTimeout(() => inp.style.borderColor = '', 900);
    return;
  }
  state = Array.from({length:5}, () => [0,0,0,0]);
  let rem = val;
  LEVELS.forEach((level, ri) => {
    let digit = Math.floor(rem / level.mult);
    rem %= level.mult;
    [{ci:3,v:5},{ci:2,v:3},{ci:1,v:2},{ci:0,v:1}].forEach(({ci,v}) => {
      while (digit >= v && state[ri][ci] < MAX_SEEDS) { state[ri][ci]++; digit -= v; }
    });
  });
  renderAll();
  document.getElementById('numInput').value = val;
  const disp = document.getElementById('numDisplay');
  disp.classList.add('flash');
  setTimeout(() => disp.classList.remove('flash'), 380);
}

/* ── Limpiar ── */
function clearAll() {
  state = Array.from({length:5}, () => [0,0,0,0]);
  document.getElementById('numInput').value = '';
  renderAll();
}

/* ── Toggle ── */
function toggleButtons() {
  buttonsVisible = !buttonsVisible;
  const grid = document.getElementById('boardGrid');
  const lbl  = document.getElementById('toggleLabel');
  if (buttonsVisible) {
    grid.classList.remove('buttons-hidden');
    lbl.textContent = 'Ocultar controles';
  } else {
    grid.classList.add('buttons-hidden');
    lbl.textContent = 'Mostrar controles';
  }
}

buildBoard();
document.getElementById('numInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') numberToBoard();
});
</script>
</body>
